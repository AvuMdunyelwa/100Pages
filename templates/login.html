{% extends "layout.html" %}

{% block content %}
    <title>Login | 100Pages</title>
    <div style='height: 100vh;' class='d-grid align-items-center'>
        {% if message %}
        <div class="alert alert-warning alert-dismissible fade show w-50 p-20 d-flex justify-content-between position-fixed top-40 start-50 translate-middle z-3" role="alert" style="box-shadow: 1px 1px 1px grey; transition: 0.5s ease;" >
                <strong>{{message}}</strong>
        </div>
        {% endif %}
        <form class='h-75 w-50 border p-4 bg-light d-grid mx-auto gap-0 rounded border border-primary' id='login-form' action='/login' method='POST'>
            <h5 class='align-self-center text-center w-auto' style="color: #0077B6;">Welcome back,<br> let's get you signed in!</h5>
            <div class="form-group">
                <label for="exampleInputEmail1">Username</label>
                <input type="text" class="form-control h-50" autocomplete='off' name="username" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label for="exampleInputPassword1">Password</label>
                <div style="width: 100%; background-color: white; display: flex; align-items: center; border: 1px solid lightgrey; padding: 0.2em; border-radius: 5px;">
                    <input type="password" class="form-control h-50" autocomplete='off' name="password" id="password-field" placeholder="Enter password" style="background: none; border: none;">
                    <span class="eye-icon" id="toggle-password" style="cursor: pointer;"><img src="static/eye-closed.svg" class="img-fluid" /></span>
                </div>
                <a href='/forgot_password' style="font-size: 0.7rem;">FORGOT PASSWORD?</a>
            </div>
            <button type="submit" class="btn btn-primary w-25 align-self-center" style="background-color: #0077B6; height: 6vh;">SIGN IN</button>
            <small style="height: fit-content;">Don't have an account? <a href='/register'>SIGN UP</a></small>
        </form>
    </div>
{% endblock %}
