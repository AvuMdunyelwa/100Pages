<svg width="520" height="120" viewBox="0 0 520 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@900&amp;display=swap');
      .wordmark { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 64px; fill: #ffffff; }
      .accent   { fill: #3BB8F5; }
    </style>
  </defs>

  <!-- Black rounded square -->
  <rect x="0" y="10" width="100" height="100" rx="22" fill="#000000"/>

  <!-- Orange bar -->
  <rect x="22" y="28" width="14" height="64" rx="7" fill="#E8541A"/>
  <!-- Blue bar -->
  <rect x="43" y="20" width="14" height="72" rx="7" fill="#3BB8F5"/>
  <!-- Pink bar -->
  <rect x="64" y="34" width="14" height="56" rx="7" fill="#F48FB1"/>

  <!-- Wordmark -->
  <text x="118" y="88" class="wordmark">100<tspan class="accent">Pages</tspan></text>
</svg>
